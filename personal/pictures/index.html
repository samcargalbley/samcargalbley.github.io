<style>

/* Picture Grid */

.photo-grid{
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:40px;
  max-width:900px;
  margin:40px auto;
}

.photo{
  text-align:center;
}

.photo img{
  width:100%;
  height:240px;
  object-fit:cover;
  border-radius:8px;
  display:block;
}

.photo figcaption{
  margin-top:10px;
  font-family:Handgloves;
  letter-spacing:.08em;
  font-size:14px;
  text-transform:uppercase;
  color:#666;
}

/* Mobile */

@media (max-width:700px){

  .photo-grid{
    grid-template-columns:1fr;
    gap:28px;
  }

  .photo img{
    height:auto;
  }

}

</style>

</head>
